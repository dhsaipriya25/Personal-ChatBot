<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Chatbot</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: linear-gradient(160deg, #dde8f5 0%, #eaf1fb 50%, #dde8f5 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    #chat-container {
      width: 100%;
      max-width: 780px;
      height: 92vh;
      background: #ffffff;
      border: 1px solid #d5e0ef;
      border-radius: 20px;
      box-shadow: 0 10px 40px rgba(60, 100, 160, 0.12);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* Header */
    #chat-header {
      padding: 16px 22px;
      background: #2d4a6e;
      border-bottom: 1px solid #25405f;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    #header-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    #avatar {
      width: 40px;
      height: 40px;
      background: rgba(255,255,255,0.15);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.2rem;
      border: 1px solid rgba(255,255,255,0.2);
    }

    #header-info h2 {
      color: #ffffff;
      font-size: 0.95rem;
      font-weight: 600;
    }

    #header-info span {
      color: rgba(255,255,255,0.6);
      font-size: 0.72rem;
      display: flex;
      align-items: center;
      gap: 5px;
      margin-top: 2px;
    }

    #status-dot {
      width: 6px;
      height: 6px;
      background: #5fd98a;
      border-radius: 50%;
      display: inline-block;
      animation: pulse 2.5s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.35; }
    }

    #clear-btn {
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.2);
      color: rgba(255,255,255,0.75);
      padding: 7px 14px;
      border-radius: 8px;
      font-size: 0.78rem;
      font-weight: 500;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: all 0.2s;
      font-family: inherit;
    }

    #clear-btn:hover {
      background: rgba(255,255,255,0.22);
      color: #ffffff;
    }

    /* Messages */
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 22px 20px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      background: #f7fafd;
      scrollbar-width: thin;
      scrollbar-color: #c5d8ee transparent;
    }

    #messages::-webkit-scrollbar { width: 4px; }
    #messages::-webkit-scrollbar-track { background: transparent; }
    #messages::-webkit-scrollbar-thumb { background: #c5d8ee; border-radius: 10px; }

    /* Welcome */
    #welcome {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      color: #8faabf;
      text-align: center;
      padding: 40px;
    }

    #welcome .welcome-icon { font-size: 2.5rem; }
    #welcome h3 { color: #3d5a78; font-size: 1.1rem; font-weight: 600; }
    #welcome p { font-size: 0.85rem; line-height: 1.7; max-width: 340px; color: #7a9ab5; }

    .supported-files {
      margin-top: 14px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .file-tag {
      background: #e8f0fa;
      border: 1px solid #c8d8ee;
      color: #4a6a8a;
      padding: 4px 10px;
      border-radius: 6px;
      font-size: 0.72rem;
      font-weight: 500;
    }

    /* Message rows */
    .message-row {
      display: flex;
      flex-direction: column;
      gap: 3px;
      animation: fadeIn 0.25s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .message-row.user  { align-items: flex-end; }
    .message-row.assistant { align-items: flex-start; }

    .message-label {
      font-size: 0.68rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: #9ab5cc;
      padding: 0 4px;
    }

    .message {
      max-width: 76%;
      padding: 11px 15px;
      border-radius: 16px;
      line-height: 1.65;
      white-space: pre-wrap;
      word-break: break-word;
      font-size: 0.92rem;
    }

    .message-row.user .message {
      background: #2d4a6e;
      color: #e8f0fa;
      border-bottom-right-radius: 4px;
    }

    .message-row.assistant .message {
      background: #ffffff;
      color: #2c3e52;
      border-bottom-left-radius: 4px;
      border: 1px solid #dce8f5;
    }

    .message-time {
      font-size: 0.65rem;
      color: #aabcce;
      padding: 0 4px;
    }

    .file-pill {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      background: #e0ecf8;
      border: 1px solid #c0d5ea;
      border-radius: 6px;
      padding: 4px 10px;
      font-size: 0.75rem;
      color: #4a6a8a;
      margin-bottom: 6px;
    }

    /* Typing indicator */
    #typing-indicator {
      display: none;
      flex-direction: column;
      gap: 3px;
      padding: 0 20px 10px;
      animation: fadeIn 0.25s ease;
    }

    #typing-indicator.visible { display: flex; }

    .typing-label {
      font-size: 0.68rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: #9ab5cc;
      padding: 0 4px;
    }

    .typing-bubble {
      background: #ffffff;
      border: 1px solid #dce8f5;
      border-radius: 16px;
      border-bottom-left-radius: 4px;
      padding: 12px 16px;
      display: flex;
      gap: 5px;
      align-items: center;
      width: fit-content;
    }

    .dot {
      width: 7px;
      height: 7px;
      background: #a0bcd8;
      border-radius: 50%;
      animation: bounce 1.3s infinite;
    }

    .dot:nth-child(2) { animation-delay: 0.18s; }
    .dot:nth-child(3) { animation-delay: 0.36s; }

    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
      30%            { transform: translateY(-5px); opacity: 1; }
    }

    /* Input area */
    #input-area {
      padding: 14px 18px;
      background: #ffffff;
      border-top: 1px solid #dce8f5;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    /* File preview bar */
    #file-preview {
      display: none;
      align-items: center;
      justify-content: space-between;
      background: #eaf3fc;
      border: 1px solid #c8ddf0;
      border-radius: 8px;
      padding: 8px 12px;
      font-size: 0.8rem;
      color: #4a6a8a;
    }

    #file-preview.visible { display: flex; }

    #file-preview-name {
      display: flex;
      align-items: center;
      gap: 7px;
      overflow: hidden;
    }

    #file-preview-name span {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    #remove-file {
      background: none;
      border: none;
      color: #9ab5cc;
      cursor: pointer;
      font-size: 1rem;
      padding: 0 2px;
      flex-shrink: 0;
      transition: color 0.2s;
    }

    #remove-file:hover { color: #e05555; }

    #input-row {
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }

    #attach-btn {
      width: 42px;
      height: 42px;
      background: #eef4fb;
      border: 1px solid #c8ddf0;
      border-radius: 10px;
      cursor: pointer;
      font-size: 1.1rem;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: all 0.2s;
      color: #6a90b0;
    }

    #attach-btn:hover {
      background: #ddeaf8;
      color: #2d4a6e;
    }

    #attach-btn.has-file {
      border-color: #2d4a6e;
      color: #2d4a6e;
      background: #d8e8f8;
    }

    #file-input { display: none; }

    #user-input {
      flex: 1;
      padding: 11px 14px;
      background: #f4f8fd;
      border: 1px solid #cddaeb;
      border-radius: 10px;
      font-size: 0.92rem;
      color: #2c3e52;
      resize: none;
      outline: none;
      font-family: inherit;
      line-height: 1.5;
      transition: border-color 0.2s;
      max-height: 120px;
    }

    #user-input::placeholder { color: #aabcce; }
    #user-input:focus { border-color: #2d4a6e; background: #ffffff; }

    #send-btn {
      width: 42px;
      height: 42px;
      background: #2d4a6e;
      color: #ffffff;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-size: 1.1rem;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: all 0.2s;
    }

    #send-btn:hover:not(:disabled) { background: #3a5f8a; }
    #send-btn:disabled { opacity: 0.35; cursor: not-allowed; }

    #input-hint {
      font-size: 0.68rem;
      color: #b0c8dc;
      text-align: right;
    }
  </style>
</head>
<body>
  <div id="chat-container">

    <div id="chat-header">
      <div id="header-left">
        <div id="avatar">🤖</div>
        <div id="header-info">
          <h2>AI Assistant</h2>
          <span><span id="status-dot"></span> Online &amp; Ready</span>
        </div>
      </div>
      <button id="clear-btn">🗑 Clear Chat</button>
    </div>

    <div id="messages">
      <div id="welcome">
        <div class="welcome-icon">💬</div>
        <h3>How can I help you today?</h3>
        <p>Ask me anything or upload a file and I'll analyze it for you.</p>
        <div class="supported-files">
          <span class="file-tag">📄 PDF</span>
          <span class="file-tag">📝 Word</span>
          <span class="file-tag">📊 PowerPoint</span>
          <span class="file-tag">📗 Excel</span>
          <span class="file-tag">🖼 Image</span>
        </div>
      </div>
    </div>

    <div id="typing-indicator">
      <div class="typing-label">AI Assistant</div>
      <div class="typing-bubble">
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
      </div>
    </div>

    <div id="input-area">
      <div id="file-preview">
        <div id="file-preview-name">
          <span id="file-icon">📎</span>
          <span id="file-name-text">file.pdf</span>
        </div>
        <button id="remove-file" title="Remove file">✕</button>
      </div>

      <div id="input-row">
        <button id="attach-btn" title="Attach file">📎</button>
        <input type="file" id="file-input"
          accept=".pdf,.docx,.pptx,.xlsx,.xls,image/png,image/jpeg,image/gif,image/webp" />
        <textarea id="user-input" rows="1"
          placeholder="Type a message or attach a file..."></textarea>
        <button id="send-btn">➤</button>
      </div>
      <div id="input-hint">Enter to send &nbsp;·&nbsp; Shift+Enter for new line &nbsp;·&nbsp; 📎 to attach files</div>
    </div>

  </div>

  <script>
    const messagesEl = document.getElementById("messages");
    const inputEl    = document.getElementById("user-input");
    const sendBtn    = document.getElementById("send-btn");
    const clearBtn   = document.getElementById("clear-btn");
    const typingInd  = document.getElementById("typing-indicator");
    const attachBtn  = document.getElementById("attach-btn");
    const fileInput  = document.getElementById("file-input");
    const filePreview     = document.getElementById("file-preview");
    const fileNameText    = document.getElementById("file-name-text");
    const fileIconEl      = document.getElementById("file-icon");
    const removeFileBtn   = document.getElementById("remove-file");

    const history = [];
    let selectedFile = null;

    const FILE_ICONS = {
      pdf: "📄", docx: "📝", pptx: "📊", xlsx: "📗", xls: "📗",
      png: "🖼", jpg: "🖼", jpeg: "🖼", gif: "🖼", webp: "🖼"
    };

    function getTime() {
      return new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    }

    function removeWelcome() {
      const w = document.getElementById("welcome");
      if (w) w.remove();
    }

    function addMessage(role, text, filePill = null) {
      removeWelcome();
      const row = document.createElement("div");
      row.className = `message-row ${role}`;

      const label = document.createElement("div");
      label.className = "message-label";
      label.textContent = role === "user" ? "You" : "AI Assistant";

      if (filePill) {
        const pill = document.createElement("div");
        pill.className = "file-pill";
        pill.textContent = filePill;
        row.appendChild(label);
        row.appendChild(pill);
      } else {
        row.appendChild(label);
      }

      const bubble = document.createElement("div");
      bubble.className = "message";
      bubble.textContent = text;

      const time = document.createElement("div");
      time.className = "message-time";
      time.textContent = getTime();

      row.appendChild(bubble);
      row.appendChild(time);
      messagesEl.appendChild(row);
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function showTyping() {
      typingInd.classList.add("visible");
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function hideTyping() {
      typingInd.classList.remove("visible");
    }

    function clearChat() {
      history.length = 0;
      selectedFile = null;
      clearFilePreview();
      hideTyping();
      messagesEl.innerHTML = `
        <div id="welcome">
          <div class="welcome-icon">💬</div>
          <h3>How can I help you today?</h3>
          <p>Ask me anything or upload a file and I'll analyze it for you.</p>
          <div class="supported-files">
            <span class="file-tag">📄 PDF</span>
            <span class="file-tag">📝 Word</span>
            <span class="file-tag">📊 PowerPoint</span>
            <span class="file-tag">🖼 Image</span>
          </div>
        </div>`;
    }

    function clearFilePreview() {
      selectedFile = null;
      filePreview.classList.remove("visible");
      attachBtn.classList.remove("has-file");
      fileInput.value = "";
    }

    // Attach button
    attachBtn.addEventListener("click", () => fileInput.click());

    fileInput.addEventListener("change", () => {
      const file = fileInput.files[0];
      if (!file) return;
      selectedFile = file;
      const ext = file.name.split(".").pop().toLowerCase();
      fileIconEl.textContent = FILE_ICONS[ext] || "📎";
      fileNameText.textContent = file.name;
      filePreview.classList.add("visible");
      attachBtn.classList.add("has-file");
    });

    removeFileBtn.addEventListener("click", clearFilePreview);

    // Auto-resize textarea
    inputEl.addEventListener("input", () => {
      inputEl.style.height = "auto";
      inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + "px";
    });

    async function readFileAsBase64(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => {
          const base64 = reader.result.split(",")[1];
          resolve(base64);
        };
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
    }

    async function sendMessage() {
      const text = inputEl.value.trim();
      if (!text && !selectedFile) return;

      const file = selectedFile;
      inputEl.value = "";
      inputEl.style.height = "auto";
      sendBtn.disabled = true;

      const displayText = text || (file ? `Please analyze this file: ${file.name}` : "");
      const filePill    = file ? `${FILE_ICONS[file.name.split(".").pop().toLowerCase()] || "📎"} ${file.name}` : null;

      addMessage("user", displayText, filePill);
      history.push({ role: "user", content: displayText });
      clearFilePreview();
      showTyping();

      try {
        const payload = { messages: history };

        if (file) {
          const b64 = await readFileAsBase64(file);
          payload.file = { name: file.name, type: file.type, data: b64 };
        }

        const res  = await fetch("/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload),
        });
        const data = await res.json();
        hideTyping();

        if (data.error) {
          addMessage("assistant", "Error: " + data.error);
        } else {
          addMessage("assistant", data.reply);
          history.push({ role: "assistant", content: data.reply });
        }
      } catch (err) {
        hideTyping();
        addMessage("assistant", "Network error. Please try again.");
      }

      sendBtn.disabled = false;
      inputEl.focus();
    }

    clearBtn.addEventListener("click", clearChat);
    sendBtn.addEventListener("click", sendMessage);
    inputEl.addEventListener("keydown", (e) => {
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });
  </script>
</body>
</html>
